# Publish the static site to GitHub Pages.
#
# This replaces GitHub's implicit "deploy from a branch" build, which has NO
# concurrency control: when several pushes land close together (parallel
# sessions on main) the overlapping deployments collide and fail with
# "Deployment failed, try again later." The concurrency gate below serializes
# them — one production deploy at a time, and an in-flight deploy is never
# cancelled — so rapid pushes queue instead of racing. See CANON §12.
name: Validate and deploy site

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Validation runs read-only. The deploy job receives its additional Pages/OIDC
# permissions below only after validation succeeds.
permissions:
  contents: read

jobs:
  validate:
    name: Validate site and Worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Build and validate site artifact
        run: python tools/build-pages-artifact.py --output "${{ runner.temp }}/island-mountain-validation"
      - name: Check JavaScript syntax
        run: find js -type f -name '*.js' -not -path '*/vendor/*' -print0 | xargs -0 -n1 node --check
      - name: Install Worker dependencies
        working-directory: worker
        run: npm ci
      - name: Typecheck Worker
        working-directory: worker
        run: npm run typecheck
      - name: Test Worker
        working-directory: worker
        run: npm test
      - name: Audit production dependencies
        working-directory: worker
        run: npm audit --omit=dev

  deploy:
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    # One deployment at a time. Do not cancel an in-flight production deploy;
    # queue the next push so every change lands and none collide.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy3.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Build curated site artifact
        run: python tools/build-pages-artifact.py --output "${{ runner.temp }}/island-mountain-site"
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Publish runtime files only. Source assets, planning documents, Worker
          # code, client files, backups, and repository tooling stay private to
          # the repository and never enter the Pages artifact.
          path: ${{ runner.temp }}/island-mountain-site
      # GitHub's Pages deploy backend fails intermittently with
      # "Deployment failed, try again later." (actions/deploy-pages#406) — a
      # transient infra flake, not our artifact. A fresh attempt almost always
      # succeeds, so the deploy self-heals instead of stranding the site until a
      # human re-triggers the run. The artifact is uploaded exactly ONCE above;
      # re-uploading would trip the duplicate-artifact bug
      # (upload-pages-artifact#97), so only the deploy step retries, with
      # backoff. The first attempt to succeed skips the rest; if all three fail
      # the job fails honestly (a real GitHub outage, not a flake).
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy1
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Back off before attempt 2
        if: steps.deploy1.outcome == 'failure'
        run: sleep 60
      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Back off before attempt 3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 120
      - name: Deploy to GitHub Pages (attempt 3, final)
        id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v5
